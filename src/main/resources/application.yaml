spring:
  application:
    name: config-Server

  profiles:
    active: native   # ✅ VERY IMPORTANT

  cloud:
    config:
      server:
        git:
          uri: https://github.com/divyanjalee200178/Library-System-Configuration-Main.git
          search-paths: platform,services
        native:
          search-locations:
            - classpath:/configurations
            - classpath:/configurations/platform
            - classpath:/configurations/services

server:
  port: 9000